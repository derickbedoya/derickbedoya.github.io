<!DOCTYPE html>
<html>
<head>
    <title>camilogin</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url(IMG_3512.jpeg);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 0;
        }

        .container {
            background: rgba(255, 255, 255, 0.92);
            border-radius: 30px;
            padding: 40px 30px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(10px);
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 15px;
            background-image: url('IMG_3747.jpeg');
            background-size: cover;
            background-position: center;
            border: 4px solid white;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }

        /* ===== SOCIAL ICON GRID (Left to Right) ===== */
        .social-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin: 20px 0;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f0f0f0;
            border-radius: 16px;
            padding: 14px 8px;
            transition: all 0.3s ease;
            text-decoration: none;
            border: 2px solid transparent;
            aspect-ratio: 1 / 1;
        }

        .social-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 25px rgba(0,0,0,0.25);
        }

        .social-btn svg {
            width: 32px;
            height: 32px;
            fill: currentColor;
        }

        /* Brand colors */
        .btn-twitch { background: #9146FF; color: white; }
        .btn-twitch:hover { background: #772CE8; }

        .btn-youtube { background: #FF0000; color: white; }
        .btn-youtube:hover { background: #CC0000; }

        .btn-tiktok { background: #000000; color: white; }
        .btn-tiktok:hover { background: #25F4EE; color: #000000; }

        .btn-instagram { background: #E4405F; color: white; }
        .btn-instagram:hover { background: #C13584; }

        .btn-twitter { background: #000000; color: white; }
        .btn-twitter:hover { background: #1DA1F2; }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Profile Picture -->
        <div class="avatar"></div>

        <h1>@camilogin</h1>
        <p class="subtitle">✨ Connect with me everywhere ✨</p>

        <div style="margin-bottom: 20px; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">

            <a href="about.html" style="color: #4A90D9; text-decoration: none; font-weight: 600;">About</a>
        </div>

        <!-- ===== SOCIAL ICON GRID (Left to Right: Twitch, YouTube, TikTok, Instagram, Twitter) ===== -->
        <div class="social-grid">

        </div>

        <div class="footer">📧 derickbedoya@icloud.com</div>
    </div>
</body>
</html>
