<!DOCTYPE html>
<html>
<head>
    <title>camilogin</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            min-height: 100vh;
        }

        body {
            background-image: url(IMG_3512.jpeg);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 0;
        }

        .container {
            background: rgba(255, 255, 255, 0.92);
            border-radius: 30px;
            padding: 30px 20px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(10px);
            max-height: 95vh;
            overflow-y: auto;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 12px;
            background-image: url('IMG_3747.jpeg');
            background-size: cover;
            background-position: center;
            border: 4px solid white;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 22px;
            color: #333;
            margin-bottom: 3px;
        }

        .subtitle {
            color: #666;
            font-size: 12px;
            margin-bottom: 18px;
        }

        /* Navigation */
        .nav-links {
            margin-bottom: 15px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .nav-links a {
            color: #4A90D9;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }
        .nav-links a:hover {
            text-decoration: underline;
        }

        /* ===== SOCIAL ICON GRID ===== */
        .social-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 15px 0;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border-radius: 14px;
            padding: 8px 4px;
            transition: all 0.3s ease;
            text-decoration: none;
            aspect-ratio: 1 / 1;
            width: 100%;
        }

        .social-btn:hover {
            transform: scale(1.1);
        }

        .social-btn img {
            width: 100%;
            height: 100%;
            max-width: 48px;
            max-height: 48px;
            object-fit: contain;
            border-radius: 12px;
            display: block;
        }

        @media (max-width: 380px) {
            .social-btn img {
                max-width: 38px;
                max-height: 38px;
            }
            .social-grid {
                gap: 8px;
            }
        }

        /* ===== CLOTHES SET - ITS OWN WHITE BOX ===== */
        .app-box {
            background: white;
            border-radius: 16px;
            padding: 18px 16px;
            margin: 16px 0 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 1px solid rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }

        .app-box:hover {
            transform: scale(1.01);
        }

        .app-box .app-icon {
            font-size: 36px;
            display: block;
            margin-bottom: 2px;
        }

        .app-box h3 {
            font-size: 17px;
            color: #333;
            margin-bottom: 3px;
        }

        .app-box p {
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .app-btn {
            display: inline-block;
            background: #007AFF;
            color: white;
            text-decoration: none;
            padding: 10px 22px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3);
        }

        .app-btn:hover {
            background: #0055CC;
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 122, 255, 0.4);
        }

        .app-btn .emoji {
            margin-right: 6px;
        }

        .footer {
            margin-top: 16px;
            font-size: 12px;
            color: #999;
        }

        /* Scrollbar */
        .container::-webkit-scrollbar {
            width: 4px;
        }
        .container::-webkit-scrollbar-track {
            background: transparent;
        }
        .container::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Profile Picture -->
        <div class="avatar"></div>

        <h1>@camilogin</h1>
        <p class="subtitle">✨ Connect with me everywhere ✨</p>

        <!-- Navigation -->
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
        </div>

        <!-- ===== SOCIAL ICON GRID (Apps come first) ===== -->
        <div class="social-grid">
            <!-- 1. Twitch -->
            <a href="https://www.twitch.tv/camilogin" target="_blank" class="social-btn">
                <img src="https://cdn.simpleicons.org/twitch/9146FF" alt="Twitch">
            </a>

            <!-- 2. YouTube -->
            <a href="https://www.youtube.com/@camilogin" target="_blank" class="social-btn">
                <img src="https://cdn.simpleicons.org/youtube/FF0000" alt="YouTube">
            </a>

            <!-- 3. TikTok -->
            <a href="https://www.tiktok.com/@cami.loginn" target="_blank" class="social-btn">
                <img src="https://cdn.simpleicons.org/tiktok/000000" alt="TikTok">
            </a>

            <!-- 4. Instagram -->
            <a href="https://www.instagram.com/camiloginn/" target="_blank" class="social-btn">
                <img src="https://cdn.simpleicons.org/instagram/E4405F" alt="Instagram">
            </a>

            <!-- 5. Facebook -->
            <a href="https://www.facebook.com/yourusername" target="_blank" class="social-btn">
                <img src="https://cdn.simpleicons.org/facebook/1877F2" alt="Facebook">
            </a>

            <!-- 6. Threads -->
            <a href="https://www.threads.net/@yourusername" target="_blank" class="social-btn">
                <img src="https://cdn.simpleicons.org/threads/000000" alt="Threads">
            </a>

            <!-- 7. Twitter -->
            <a href="https://x.com/cami_login" target="_blank" class="social-btn">
                <img src="https://cdn.simpleicons.org/x/000000" alt="Twitter">
            </a>

            <!-- 8. Snapchat -->
            <a href="https://www.snapchat.com/add/yourusername" target="_blank" class="social-btn">
                <img src="https://cdn.simpleicons.org/snapchat/FFFC00" alt="Snapchat">
            </a>
        </div>

        <!-- ===== CLOTHES SET - ITS OWN WHITE BOX ===== -->
        <div class="app-box">
            <span class="app-icon">👕</span>
            <h3>Clothes Set</h3>
            <p>Your ultimate outfit planning app. Mix, match, and style your wardrobe effortlessly.</p>
            <a href="https://apps.apple.com/us/app/clothes-set/id6759241617" target="_blank" class="app-btn">
                <span class="emoji">📲</span> View on App Store
            </a>
        </div>

        <div class="footer">📧 derickbedoya@icloud.com</div>
    </div>
</body>
</html>
