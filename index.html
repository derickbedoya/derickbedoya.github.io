<!DOCTYPE html>
<html>
<head>
    <title>camilogin</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* 👇 CHANGE 'background.jpg' to YOUR background image filename */
            background-image: url(IMG_3512.jpeg);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Dark overlay so text is readable */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 0;
        }

        .container {
            background: rgba(255, 255, 255, 0.92);
            border-radius: 30px;
            padding: 40px 30px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(10px);
        }

        /* 👇 PROFILE PICTURE CIRCLE */
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 15px;
            /* 👇 CHANGE 'profile.jpg' to YOUR profile image filename */
            background-image: url('IMG_3747.jpeg');
            background-size: cover;
            background-position: center;
            border: 4px solid white;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .link-btn {
            display: block;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            text-decoration: none;
            padding: 16px 20px;
            margin: 12px 0;
            border-radius: 50px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            border: 2px solid rgba(0,0,0,0.05);
        }

        .link-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .btn-instagram:hover { background: #E4405F; color: white; }
        .btn-twitter:hover { background: #1DA1F2; color: white; }
        .btn-youtube:hover { background: #FF0000; color: white; }
        .btn-tiktok:hover { background: #000000; color: white; }
        .btn-github:hover { background: #333; color: white; }
        .btn-linkedin:hover { background: #0A66C2; color: white; }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }

        .icon {
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Profile Picture -->
        <div class="avatar"></div>

        <h1>@camilogin</h1>
        <p class="subtitle">✨ Connect with me everywhere ✨</p>

        <!-- Navigation -->
        <div style="margin-bottom: 20px; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
            <a href="index.html" style="color: #4A90D9; text-decoration: none; font-weight: 600;">Home</a>
            <a href="about.html" style="color: #4A90D9; text-decoration: none; font-weight: 600;">About</a>
        </div>

        <!-- Social Links - REPLACE URLs with YOUR actual ones -->
        <a href="https://instagram.com/yourusername" target="_blank" class="link-btn btn-instagram">
            <span class="icon">📸</span> Instagram
        </a>

        <a href="https://twitter.com/yourusername" target="_blank" class="link-btn btn-twitter">
            <span class="icon">🐦</span> Twitter / X
        </a>

        <a href="https://youtube.com/@yourusername" target="_blank" class="link-btn btn-youtube">
            <span class="icon">▶️</span> YouTube
        </a>

        <a href="https://tiktok.com/@yourusername" target="_blank" class="link-btn btn-tiktok">
            <span class="icon">🎵</span> TikTok
        </a>

        <a href="https://github.com/yourusername" target="_blank" class="link-btn btn-github">
            <span class="icon">💻</span> GitHub
        </a>

        <a href="https://linkedin.com/in/yourusername" target="_blank" class="link-btn btn-linkedin">
            <span class="icon">🔗</span> LinkedIn
        </a>

        <div class="footer">📧 derickbedoya@icloud.com</div>
    </div>
</body>
</html>
